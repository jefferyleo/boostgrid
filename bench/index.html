<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boostgrid · Benchmark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../dist/boostgrid.css" />
</head>
<body class="container py-4">
  <h1 class="h3">Boostgrid benchmark</h1>
  <p class="text-muted">Generates random rows and measures the time taken from <code>new Boostgrid()</code> until <code>loaded</code>.</p>
  <div class="d-flex gap-2 mb-3 flex-wrap">
    <button class="btn btn-outline-primary btn-sm" data-rows="1000">1 000 rows</button>
    <button class="btn btn-outline-primary btn-sm" data-rows="10000">10 000 rows</button>
    <button class="btn btn-outline-primary btn-sm" data-rows="100000">100 000 rows</button>
    <span class="ms-3 align-self-center" id="result"></span>
  </div>
  <div id="host"></div>
  <script type="module">
    import { Boostgrid } from "../dist/boostgrid.js";

    function run(n) {
      const host = document.getElementById("host");
      host.innerHTML = "";
      const t = document.createElement("table");
      t.className = "table table-sm table-striped";
      t.innerHTML = `<thead><tr>
        <th data-column-id="id" data-identifier="true" data-type="numeric">ID</th>
        <th data-column-id="name" data-order="asc">Name</th>
        <th data-column-id="email">Email</th>
        <th data-column-id="score" data-type="numeric">Score</th>
      </tr></thead><tbody></tbody>`;
      const tbody = t.querySelector("tbody");
      const frag = document.createDocumentFragment();
      for (let i = 1; i <= n; i++) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${i}</td><td>User ${i}</td><td>u${i}@example.com</td><td>${(Math.random()*100)|0}</td>`;
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
      host.appendChild(t);

      const start = performance.now();
      t.addEventListener("boostgrid:loaded", () => {
        const dt = (performance.now() - start).toFixed(1);
        document.getElementById("result").textContent = `${n.toLocaleString()} rows · first paint ${dt} ms`;
      }, { once: true });
      new Boostgrid(t, { rowCount: 50 });
    }
    document.querySelectorAll("[data-rows]").forEach(b => {
      b.addEventListener("click", () => run(Number(b.dataset.rows)));
    });
    run(1000);
  </script>
</body>
</html>
